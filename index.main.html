<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarigma</title>
    <meta
      name="description"
      content="Sarigma — цифровая экосистема проектов. Ведутся технические работы."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="img/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-primary: #0a0a0a;
        --text-primary: #f0f0f0;
        --text-secondary: #a0a0a0;
        --gold-gradient: linear-gradient(
          135deg,
          #bf953f,
          #fcf6b5,
          #b38728,
          #fbf5b7
        );
        --gold-base: #d4af37;
        --gold-dark: #b38728;
        --font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-secondary);
        font-family: var(--font-family);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* Декоративный круг */
      .bg-ornament {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        border: 1px solid rgba(191, 149, 63, 0.06);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        animation: ornamentPulse 8s ease-in-out infinite;
      }

      .bg-ornament::after {
        content: "";
        position: absolute;
        top: 60px;
        left: 60px;
        right: 60px;
        bottom: 60px;
        border: 1px solid rgba(191, 149, 63, 0.04);
        border-radius: 50%;
      }

      /* Золотой текст */
      .gold-text {
        background: var(--gold-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 600;
      }

      /* Контейнер */
      .maintenance-container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px;
        max-width: 600px;
        animation: fadeInUp 1s var(--transition-smooth) both;
      }

      /* Логотип */
      .maintenance-logo {
        width: 90px;
        height: auto;
        margin-bottom: 32px;
        animation: logoFloat 4s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
      }

      /* Иконка */
      .maintenance-icon {
        display: inline-block;
        margin-bottom: 24px;
        animation: iconRotate 3s ease-in-out infinite;
      }

      .gear-icon {
        width: 48px;
        height: 48px;
        color: var(--gold-base);
        opacity: 0.8;
      }

      /* Заголовок */
      .maintenance-title {
        font-size: 2rem;
        font-weight: 300;
        color: #fff;
        letter-spacing: -0.5px;
        margin-bottom: 16px;
        line-height: 1.3;
      }

      /* Описание */
      .maintenance-description {
        font-size: 1rem;
        color: #888;
        font-weight: 300;
        line-height: 1.7;
        margin-bottom: 32px;
        max-width: 440px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Разделитель */
      .gold-divider {
        width: 50px;
        height: 1px;
        background: var(--gold-gradient);
        margin: 0 auto 24px;
        opacity: 0.6;
      }

      /* Подпись */
      .maintenance-footer {
        font-size: 0.8rem;
        color: #555;
        letter-spacing: 2px;
      }

      /* Точки загрузки */
      .loading-dots {
        display: inline-flex;
        gap: 6px;
        margin-top: 8px;
      }

      .loading-dots span {
        width: 5px;
        height: 5px;
        background: var(--gold-base);
        border-radius: 50%;
        animation: dotPulse 1.4s ease-in-out infinite;
      }

      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      /* Анимации */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes logoFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes ornamentPulse {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.05);
          opacity: 0.7;
        }
      }

      @keyframes dotPulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.4);
        }
      }

      @keyframes iconRotate {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(15deg);
        }
        75% {
          transform: rotate(-15deg);
        }
      }

      /* Адаптив */
      @media (max-width: 600px) {
        .maintenance-title {
          font-size: 1.4rem;
        }
        .maintenance-description {
          font-size: 0.9rem;
        }
        .maintenance-logo {
          width: 64px;
        }
        .bg-ornament {
          width: 350px;
          height: 350px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-ornament"></div>

    <div class="maintenance-container">
      <!-- Логотип Sarigma -->
      <img src="img/sarigmaLogo.png" alt="Sarigma" class="maintenance-logo" />

      <!-- Иконка шестерёнки -->
      <div class="maintenance-icon">
        <svg
          class="gear-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
      </div>

      <!-- Заголовок -->
      <h1 class="maintenance-title">
        Проводятся<br /><span class="gold-text">технические работы</span>
      </h1>

      <!-- Описание -->
      <p class="maintenance-description">
        Мы обновляем платформу, чтобы сделать её ещё лучше. Совсем скоро всё
        заработает — спасибо за терпение!
      </p>

      <!-- Разделитель -->
      <div class="gold-divider"></div>

      <!-- Подпись -->
      <div class="maintenance-footer">
        <span class="gold-text">Sarigma</span>
      </div>

      <!-- Точки -->
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </body>
</html>
